<!DOCTYPE html>
<html lang="en" class="scroll-smooth">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Arnab | Web Developer</title>
  <link rel="icon" type="image/jpeg" href="/favicon.png" />
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,600;1,600&family=JetBrains+Mono:wght@400;500;600&display=swap"
    rel="stylesheet">
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
            serif: ['Playfair Display', 'serif'],
            mono: ['JetBrains Mono', 'Fira Code', 'monospace'],
          },
          animation: {
            'fade-in': 'fadeIn 0.5s ease-in-out',
            'slide-up': 'slideUp 0.5s ease-out',
          },
          keyframes: {
            fadeIn: {
              '0%': { opacity: '0' },
              '100%': { opacity: '1' },
            },
            slideUp: {
              '0%': { transform: 'translateY(20px)', opacity: '0' },
              '100%': { transform: 'translateY(0)', opacity: '1' },
            }
          },
          typography: (theme) => ({
            DEFAULT: {
              css: {
                color: theme('colors.zinc.600'),
                '--tw-prose-headings': theme('colors.zinc.900'),
                '--tw-prose-quotes': theme('colors.zinc.800'),
              },
            },
            invert: {
              css: {
                color: theme('colors.zinc.400'),
                '--tw-prose-headings': theme('colors.zinc.100'),
                '--tw-prose-quotes': theme('colors.zinc.200'),
              },
            },
          }),
        }
      },
      plugins: [],
    }
  </script>
  <style>
    /* Custom scrollbar for a cleaner look */
    ::-webkit-scrollbar {
      width: 8px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background-color: #e4e4e7;
      border-radius: 20px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background-color: #d4d4d8;
    }

    /* Dark mode scrollbar */
    .dark ::-webkit-scrollbar-thumb {
      background-color: #3f3f46;
    }

    .dark ::-webkit-scrollbar-thumb:hover {
      background-color: #52525b;
    }

    .glass-nav {
      background: rgba(255, 255, 255, 0.7);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }

    /* Code block styling */
    pre[class*="language-"] {
      border-radius: 8px;
      margin: 1.5rem 0;
      box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
    }

    code[class*="language-"] {
      font-family: 'JetBrains Mono', 'Fira Code', monospace;
      font-size: 0.9rem;
      line-height: 1.6;
    }
  </style>

  <!-- Prism.js for syntax highlighting -->
  <link href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-typescript.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-javascript.min.js"></script>

  <script type="importmap">
  {
    "imports": {
      "react-dom/": "https://aistudiocdn.com/react-dom@^19.2.0/",
      "lucide-react": "https://aistudiocdn.com/lucide-react@^0.554.0",
      "react/": "https://aistudiocdn.com/react@^19.2.0/",
      "react": "https://aistudiocdn.com/react@^19.2.0",
      "framer-motion": "https://aistudiocdn.com/framer-motion@^12.23.24",
      "react-router-dom": "https://aistudiocdn.com/react-router-dom@^7.9.6"
    }
  }
  </script>

  <!-- Mermaid.js for diagrams -->
  <script type="module">
    import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.esm.min.mjs';
    mermaid.initialize({
      startOnLoad: false,
      theme: 'base',
      themeVariables: {
        primaryColor: '#e1f5ff',
        primaryTextColor: '#18181b',
        primaryBorderColor: '#3b82f6',
        lineColor: '#71717a',
        secondaryColor: '#d4edda',
        tertiaryColor: '#fff3cd'
      }
    });
    window.mermaid = mermaid;
  </script>
  <link rel="stylesheet" href="/index.css">
</head>

<body
  class="bg-zinc-50 text-zinc-900 dark:bg-zinc-950 dark:text-zinc-200 antialiased selection:bg-zinc-200 selection:text-black dark:selection:bg-zinc-700 dark:selection:text-white transition-colors duration-300">
  <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>

</html>
